<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Identifiers | RE Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
<body>
<div class="main">
    <h1 class="mb-4">Global Identifier Ledger</h1>
    <div class="card p-4">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>ResearchID (DOI)</th>
                    <th>Journal Source</th>
                    <th>Target URL</th>
                    <th>Issued Date</th>
                </tr>
            </thead>
            <tbody id="idMasterTable"></tbody>
        </table>
    </div>
</div>

<script>
    async function loadAllIds() {
        const res = await fetch('/api/admin/all-ids');
        const data = await res.json();
        const table = document.getElementById('idMasterTable');
        table.innerHTML = "";
        data.forEach(item => {
            table.innerHTML += `
                <tr>
                    <td><span class="text-primary fw-bold">${item.identifier}</span></td>
                    <td>${item.journal_name}</td>
                    <td><a href="${item.target_url}" target="_blank" class="small text-muted">${item.target_url}</a></td>
                    <td>${new Date(item.created_at).toLocaleDateString()}</td>
                </tr>`;
        });
    }
    loadAllIds();
</script>
</body>
</html>
