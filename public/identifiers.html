<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Identifiers | RE Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        .sidebar { background: #1e293b; min-height: 100vh; color: white; padding: 25px; position: fixed; width: 260px; }
        .main { margin-left: 260px; padding: 40px; }
        .nav-link { color: #cbd5e1; margin-bottom: 15px; display: block; text-decoration: none; }
        .nav-link.active { color: white; font-weight: bold; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 class="mb-4 text-primary"><i class="fas fa-shield-alt me-2"></i>RE Agency</h3>
    <hr class="mb-4">
    <a href="/dashboard" class="nav-link"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
    <a href="/journals" class="nav-link"><i class="fas fa-users me-2"></i> Client Journals</a>
    <a href="/identifiers" class="nav-link active"><i class="fas fa-fingerprint me-2"></i> All Identifiers</a>
    <a href="/billing" class="nav-link"><i class="fas fa-file-invoice-dollar me-2"></i> Billing</a>
</div>

<div class="main">
    <h1 class="mb-4">Global Identifier Ledger</h1>
    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>ResearchID (DOI)</th>
                        <th>Journal Source</th>
                        <th>Target URL</th>
                        <th>Issued Date</th>
                    </tr>
                </thead>
                <tbody id="idMasterTable">
                    <tr><td colspan="4" class="text-center">Loading identifiers...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadAllIds() {
        try {
            const res = await fetch('/api/admin/all-ids');
            if (!res.ok) throw new Error("API Error");
            const data = await res.json();
            
            const table = document.getElementById('idMasterTable');
            table.innerHTML = "";
            
            if (data.length === 0) {
                table.innerHTML = "<tr><td colspan='4' class='text-center'>No Identifiers Found</td></tr>";
                return;
            }

            data.forEach(item => {
                table.innerHTML += `
                    <tr>
                        <td><span class="text-primary fw-bold">${item.identifier}</span></td>
                        <td><span class="badge bg-light text-dark border">${item.journal_name}</span></td>
                        <td><a href="${item.target_url}" target="_blank" class="small text-muted text-truncate d-inline-block" style="max-width: 250px;">${item.target_url}</a></td>
                        <td>${new Date(item.created_at).toLocaleDateString()}</td>
                    </tr>`;
            });
        } catch (err) {
            document.getElementById('idMasterTable').innerHTML = "<tr><td colspan='4' class='text-center text-danger'>Error loading data</td></tr>";
        }
    }
    loadAllIds();
</script>
</body>
</html>
