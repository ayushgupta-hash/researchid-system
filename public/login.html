<!DOCTYPE html>
<html lang="en">
<head>
    <title>ResearchID | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a73e8; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="login-card">
    <h3 class="text-center mb-4">Portal Login</h3>
    <input type="text" id="user" class="form-control mb-3" placeholder="Username">
    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
    <button onclick="doLogin()" class="btn btn-primary w-100 p-2">Enter Dashboard</button>
</div>
<script>
    async function doLogin() {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: document.getElementById('user').value, password: document.getElementById('pass').value })
        });
        if(res.ok) window.location.href = '/dashboard';
        else alert("Wrong Credentials");
    }
</script>
</body>
</html>
