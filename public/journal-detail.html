<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Journal History | RE Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container shadow-sm">
        <a href="/journals" class="btn btn-sm btn-secondary mb-3">← Back to Journals</a>
        <h2 id="jName">Loading Journal...</h2>
        <hr>
        <h5>Issued ResearchIDs</h5>
        <table class="table mt-3">
            <thead><tr><th>ID</th><th>Title</th><th>Date</th></tr></thead>
            <tbody id="papersList"></tbody>
        </table>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const jId = urlParams.get('id');

        async function loadHistory() {
            const res = await fetch('/api/admin/all-ids');
            const data = await res.json();
            const filtered = data.filter(item => item.client_id == jId);
            
            if(filtered.length > 0) document.getElementById('jName').innerText = filtered[0].journal_name;
            
            const list = document.getElementById('papersList');
            filtered.forEach(p => {
                list.innerHTML += `<tr><td>${p.identifier}</td><td>${JSON.parse(p.metadata).title || 'N/A'}</td><td>${new Date(p.created_at).toLocaleDateString()}</td></tr>`;
            });
        }
        loadHistory();
    </script>
</body>
</html>
