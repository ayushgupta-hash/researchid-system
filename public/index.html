<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResearchID Management System</title>
    <style>
        :root { --primary: #2563eb; --dark: #1e293b; --light: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { background: var(--dark); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .success-box { background: #dcfce7; color: #166534; padding: 15px; border-radius: 5px; margin-top: 15px; display: none; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Research Edge & Publication</h1>
        <p>Official ResearchID Registration Agency Portal</p>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Generate New ResearchID</h2>
            <label>Client API Key</label>
            <input type="text" id="apiKey" placeholder="e.g. RE-EDGE-2024">
            <label>Target URL (Paper Link)</label>
            <input type="url" id="targetUrl" placeholder="https://journal.com/paper-1">
            <label>Paper Title</label>
            <input type="text" id="title" placeholder="Enter paper title">
            <button onclick="generateID()">Generate & Register ID</button>
            
            <div id="resultBox" class="success-box">
                <strong>Success! ResearchID Created:</strong><br>
                <span id="finalID"></span>
            </div>
        </div>

        <div class="card">
            <h2>System Overview</h2>
            <p>Total Identifiers Issued: <strong id="totalCount">0</strong></p>
            <h3>Active Clients</h3>
            <table>
                <thead>
                    <tr><th>Journal</th><th>Balance</th></tr>
                </thead>
                <tbody id="clientList">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // System load hote hi stats dikhaye
    async function loadStats() {
        const res = await fetch('/api/admin/stats');
        const data = await res.json();
        document.getElementById('totalCount').innerText = data.total;
        
        const list = document.getElementById('clientList');
        list.innerHTML = "";
        data.clients.forEach(c => {
            list.innerHTML += `<tr><td>${c.name}</td><td>${c.balance} IDs</td></tr>`;
        });
    }

    // Naya ID generate karne ka function
    async function generateID() {
        const payload = {
            apiKey: document.getElementById('apiKey').value,
            targetUrl: document.getElementById('targetUrl').value,
            title: document.getElementById('title').value
        };

        const res = await fetch('/api/mint', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        if(data.success) {
            const box = document.getElementById('resultBox');
            box.style.display = 'block';
            document.getElementById('finalID').innerText = window.location.origin + "/id/" + data.researchID;
            loadStats(); // Update table
        } else {
            alert("Error: " + data.error);
        }
    }

    loadStats();
</script>

</body>
</html>
