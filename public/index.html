<!DOCTYPE html>
<html lang="en">
<head>
    <title>ResearchID Pro Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .nav { background: #1a73e8; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1a73e8; margin-top: 0; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 600; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .stats-box { font-size: 28px; font-weight: bold; color: #34a853; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-size: 13px; color: #666; }
        .success-res { background: #e6f4ea; border: 1px solid #34a853; color: #1e8e3e; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav">
        <h1 style="margin:0">Research Edge & Publication</h1>
        <small>Registration Agency Administrative Portal</small>
    </div>

    <div class="grid">
        <div>
            <div class="card" style="margin-bottom:20px;">
                <h2>Add New Client</h2>
                <input type="text" id="newName" placeholder="Journal Name">
                <input type="text" id="newKey" placeholder="Assign API Key (e.g. JRNL-01)">
                <input type="number" id="newBal" placeholder="ID Credits (e.g. 100)">
                <button onclick="addClient()">Register Journal</button>
            </div>

            <div class="card">
                <h2>Mint ResearchID</h2>
                <input type="text" id="mintKey" placeholder="Enter Client API Key">
                <input type="url" id="mintUrl" placeholder="Paste Paper URL">
                <input type="text" id="mintTitle" placeholder="Paper Title">
                <button onclick="mintID()" style="background:#34a853">Generate ID</button>
                <div id="resultBox" class="success-res"></div>
            </div>
        </div>

        <div class="card">
            <h2>System Monitoring</h2>
            <p>Total ResearchIDs Generated</p>
            <div class="stats-box" id="totalCount">0</div>
            
            <h3>Client Ledger</h3>
            <table>
                <thead>
                    <tr><th>Journal</th><th>API Key</th><th>Balance</th></tr>
                </thead>
                <tbody id="clientTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadData() {
        const res = await fetch('/api/admin/stats');
        const data = await res.json();
        document.getElementById('totalCount').innerText = data.total;
        const table = document.getElementById('clientTable');
        table.innerHTML = "";
        data.clients.forEach(c => {
            table.innerHTML += `<tr><td>${c.name}</td><td><code>${c.api_key}</code></td><td><b>${c.balance}</b></td></tr>`;
        });
    }

    async function addClient() {
        const payload = {
            name: document.getElementById('newName').value,
            apiKey: document.getElementById('newKey').value,
            balance: document.getElementById('newBal').value
        };
        const res = await fetch('/api/admin/add-client', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        if(res.ok) { alert("Client Added!"); loadData(); }
    }

    async function mintID() {
        const payload = {
            apiKey: document.getElementById('mintKey').value,
            targetUrl: document.getElementById('mintUrl').value,
            title: document.getElementById('mintTitle').value
        };
        const res = await fetch('/api/mint', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if(data.success) {
            const box = document.getElementById('resultBox');
            box.style.display = 'block';
            box.innerHTML = `<strong>ID Generated:</strong><br>${window.location.origin}/id/${data.researchID}`;
            loadData();
        } else { alert("Error: " + data.error); }
    }

    loadData();
</script>
</body>
</html>
