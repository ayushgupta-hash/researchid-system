<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Journals | RE Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a73e8; --bg: #f0f2f5; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        .sidebar { background: #1e293b; min-height: 100vh; color: white; padding: 25px; position: fixed; width: 260px; }
        .main { margin-left: 260px; padding: 40px; }
        .nav-link { color: #cbd5e1; margin-bottom: 15px; display: block; text-decoration: none; }
        .nav-link.active { color: white; font-weight: bold; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 class="mb-4 text-primary"><i class="fas fa-shield-alt me-2"></i>RE Agency</h3>
    <hr>
    <a href="/dashboard" class="nav-link"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
    <a href="/journals" class="nav-link active"><i class="fas fa-users me-2"></i> Client Journals</a>
    <a href="/identifiers" class="nav-link"><i class="fas fa-fingerprint me-2"></i> All Identifiers</a>
    <a href="/billing" class="nav-link"><i class="fas fa-file-invoice-dollar me-2"></i> Billing</a>
    <div style="position: absolute; bottom: 30px; width: 80%;">
        <a href="/api/logout" class="btn btn-outline-danger w-100">Sign Out</a>
    </div>
</div>

<div class="main">
    <div class="d-flex justify-content-between mb-4">
        <h1>Client Journals</h1>
        <button class="btn btn-primary" onclick="location.href='/dashboard'"><i class="fas fa-plus me-2"></i>Register New</button>
    </div>

    <div class="card p-4">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>Journal Name</th>
                    <th>API Key</th>
                    <th>Credits Left</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="journalList"></tbody>
        </table>
    </div>
</div>

<script>
    async function loadJournals() {
        const res = await fetch('/api/admin/stats');
        const data = await res.json();
        const table = document.getElementById('journalList');
        table.innerHTML = "";
        data.clients.forEach(c => {
            table.innerHTML += `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td><code>${c.api_key}</code></td>
                    <td><span class="badge bg-success">${c.balance}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-2" onclick="topup(${c.id})">Top-up</button>
                        <button class="btn btn-sm btn-info text-white" onclick="viewDetail(${c.id})">History</button>
                    </td>
                </tr>`;
        });
    }

    async function topup(id) {
        const amt = prompt("Enter Credits to Add:");
        if(!amt) return;
        const res = await fetch('/api/admin/topup', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ clientId: id, amount: parseInt(amt) })
        });
        if(res.ok) { alert("Recharge Successful!"); loadJournals(); }
    }

    function viewDetail(id) {
        window.location.href = `/journal-detail?id=${id}`;
    }

    loadJournals();
</script>
</body>
</html>
